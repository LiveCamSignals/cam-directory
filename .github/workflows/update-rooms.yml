name: Update rooms.json

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes — adjust as you like
  workflow_dispatch:          # lets you trigger it manually from the Actions tab

jobs:
  update-rooms:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest rooms
        run: node scripts/fetch-rooms.js

      - name: Commit updated rooms.json
        run: |
          git config user.name "room-bot"
          git config user.email "actions@github.com"
          git add rooms.json
          git diff --cached --quiet || git commit -m "Update rooms.json"
          git push

name: Update rooms.json

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 min
  workflow_dispatch:

jobs:
  update-rooms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest rooms
        run: node scripts/fetch-rooms.js

      - name: Commit if changed
        run: |
          git config user.name "cam-bot"
          git config user.email "actions@github.com"
          git add rooms.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update rooms.json (auto)"
            git push
          fi
